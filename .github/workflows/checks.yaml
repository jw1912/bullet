on:
    pull_request:
    push:
      branches:
        - main

name: cargo
jobs:
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4
        - uses: dtolnay/rust-toolchain@stable
          with:
            components: clippy
        - run: |
            cargo clippy --workspace
            CUDA_PATH=. cargo clippy --workspace --features cuda
            HIP_PATH=. cargo clippy --workspace --features rocm

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4
        - uses: dtolnay/rust-toolchain@stable
        - run: cargo test --workspace

  format:
    name: format
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4
        - uses: dtolnay/rust-toolchain@stable
          with:
            components: rustfmt
        - run: cargo fmt --all -- --check

